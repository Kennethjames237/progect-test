name: test

services:
  front:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./src/Frontend:/usr/share/nginx/html
      - ./frontend/default.conf:/etc/nginx/conf.d/default.conf

  back:
    build:
      context: docker/back
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: src/Backend
        target: /var/www/html
    ports:
      - "8081:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: